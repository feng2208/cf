name: Test IPs and Update

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Run test script
        env:
          URL_PREFIX: ${{ secrets.URL_PREFIX }}
          TARGET_URL: 'https://example.org'
        run: python test_ips.py

      - name: Commit, push and upload changes
        env:
          UPLOAD_URL: ${{ secrets.UPLOAD_URL }}
          UPLOAD_PASSWORD: ${{ secrets.UPLOAD_PASSWORD }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add *.json
          if ! git diff --cached --quiet; then
            git diff --cached --name-only -- '*.json' | while IFS= read -r file; do
              if [ -n "$file" ]; then
                echo "Uploading $file to remote service..."
                curl -s -S -X POST -F "file=@$file" -F "password=$UPLOAD_PASSWORD" "$UPLOAD_URL"
              fi
            done
            
            git commit -m "Auto-update"
            git push
          else
            echo "No changes to commit."
          fi
